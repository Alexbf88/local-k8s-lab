name: Continuous Integration & Deployment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Code Quality Job (Linting & Formatting)
  lint-and-validate:
    name: Code Quality Assurance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Architecture
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Linters and Formatters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      # Black automatically reads settings from backend/pyproject.toml
      - name: Verify Code Formatting (Black)
        run: |
          black --check backend/

      - name: Run Syntax and Style Lint (Flake8)
        run: |
          # Stop the build if there are critical Python syntax errors
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Enforce line length directly in the command matching our standard
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # 2. Container Build Validation Job
  verify-docker-build:
    name: Verify Container Compilation
    runs-on: ubuntu-latest
    needs: lint-and-validate  # Only runs if linting passes completely
    steps:
      - name: Checkout Code Architecture
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Container Compilation
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false  # Test compilation only; do not push to a registry yet

  # 3. Deployment Job Stub
  deploy-infrastructure:
    name: Cluster Deployment Trigger
    needs: verify-docker-build  # Now waits for the container verification to clear
    runs-on: ubuntu-latest
    steps:
      - name: Code Verification Complete
        run: |
          echo "Integration pipeline executed successfully."
