name: CI/CD Pipeline - Portaria Backend

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # This automatically matches your GitHub username/repository path in lowercase
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 👈 Critical: Gives the runner permission to upload to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # We keep your quality gates intact!
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.11'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Run Black Code Formatter Check
        run: black --check backend/

      # Set up buildx for optimized container caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry using the built-in temporary GitHub Token
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push using the existing multi-stage setup
      - name: Build and Push DRF Multi-Stage Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Tags both 'latest' and the specific Git Commit SHA for deployment safety
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
